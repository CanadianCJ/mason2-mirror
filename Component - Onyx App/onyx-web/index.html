<!doctype html>
<html lang="en">
<head>
 <link rel="manifest" href="/manifest.webmanifest" />
 <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Onyx</title>
  <style>
    html,body,#root{height:100%} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu, Cantarell, Noto Sans, Arial, "Apple Color Emoji","Segoe UI Emoji"}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#0f172a;color:#fff}
    .brand{font-weight:700;letter-spacing:.5px}
    .sidebar{background:#f1f5f9;border-right:1px solid #e2e8f0}
    .sidebar a{display:block;padding:10px 12px;color:#0f172a;text-decoration:none;border-left:3px solid transparent}
    .sidebar a.active{background:#e2e8f0;border-left-color:#0ea5e9}
    .chip{display:inline-block;font-size:12px;padding:2px 6px;border-radius:999px;background:#e2e8f0;margin-left:6px}
    .main{background:#fafafa;overflow:auto}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:12px;margin-bottom:10px}
    .btn{display:inline-block;background:#0ea5e9;color:#fff;border:none;border-radius:6px;padding:8px 12px;cursor:pointer}
    .btn.secondary{background:#334155}
    .muted{color:#475569}
    .row{display:flex;gap:10px;align-items:center}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
<script type="module" src="/src/agent.ts"></script>

</body>
</html>
